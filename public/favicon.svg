<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f37854;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff9e7d;stop-opacity:1" />
    </linearGradient>
    <filter id="drop" x="-20%" y="-20%" width="150%" height="150%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Main Pin Base -->
  <path d="M 50 15 C 30 15 15 30 15 50 C 15 70 50 90 50 90 C 50 90 85 70 85 50 C 85 30 70 15 50 15 Z" fill="url(#grad)" filter="url(#drop)" />
  
  <!-- Map Center Hole -->
  <circle cx="50" cy="45" r="12" fill="#ffffff" />

  <!-- The Shattered Debris (Top Right) -->
  <polygon points="75,20 85,15 80,30" fill="#f37854" />
  <polygon points="85,35 95,25 90,40" fill="#ff9e7d" />
  <circle cx="70" cy="18" r="3" fill="#f37854" />
  <circle cx="92" cy="18" r="2" fill="#ff9e7d" />
</svg>
